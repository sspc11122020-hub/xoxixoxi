name: دراما قصيره

on:
  schedule:
     - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    
    # 🔥 هذا هو الجزء الناقص والضروري لكي يتمكن الـ Action من عمل Push وحفظ الملفات
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Run Extractor
        # ⚠️ تأكد أن اسم الملف هنا هو نفس اسم ملف الكود الخاص بك (مثلاً index.js أو drama.js)
        run: node drama.js

      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # إعدادات Git
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # نضيف ملفات البيانات فقط
          git add Dailymotion/ || true
          
          # نتأكد إذا في تغييرات
          if git diff --staged --quiet; then
            echo "ℹ️ لا توجد تغييرات جديدة لتُحفظ"
            exit 0
          fi
          
          # نسوي commit
          git commit -m "تحديث الفيديوهات العربية: $(date +'%Y-%m-%d %H:%M')"
          
          # نجيب آخر التغييرات لتفادي التعارض
          git pull origin main --rebase
          
          # نرفع التغييرات
          git push origin main
          
          echo "✅ تم رفع التغييرات بنجاح"
