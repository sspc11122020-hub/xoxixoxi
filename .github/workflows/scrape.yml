name: استخراج موقع akamaized

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg & Chromium Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgconf-2-4 libatk1.0-0 libatk-bridge2.0-0 libgdk-pixbuf2.0-0 libgtk-3-0 libgbm-dev libnss3 libxss1 libasound2

      - name: Install Dependencies
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install puppeteer cheerio sharp fluent-ffmpeg

      - name: Run Scraper
        run: |
          echo "📺 بدء تشغيل المتصفح والتقاط الـ Network..."
          node channels.js
        continue-on-error: true

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global core.quotePath false

          git add -A
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "لا توجد تغييرات جديدة للمزامنة."
            exit 0
          fi

          git commit -m "Auto-update channels via Puppeteer: $(date)"
          git pull --rebase -X ours origin main
          git push origin main
