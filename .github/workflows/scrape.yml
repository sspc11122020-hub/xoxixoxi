name: استخراج موقع akamaized

on:
  schedule:
    - cron: '0 */12 * * *' # تشغيل تلقائي كل 12 ساعة
  workflow_dispatch: # زر للتشغيل اليدوي

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # تثبيت الحزم الأساسية للنظام لتشغيل واجهات المتصفحات بدون مشاكل
      - name: Install FFmpeg & System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgbm1 libnss3 libxss1 libasound2t64

      - name: Install Dependencies
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install

      # 🎯 الخطوة السحرية: تنزيل وتثبيت متصفح Chrome المخصص لـ Puppeteer في الخادم
      - name: Install Puppeteer Chrome Browser
        run: |
          echo "🌐 جاري تنزيل متصفح Chrome المتوافق مع البيئة المؤتمتة..."
          npx puppeteer browsers install chrome

      - name: Run Scraper
        run: |
          echo "📺 بدء تشغيل المتصفح والتقاط الـ Network..."
          node channels.js
        continue-on-error: true

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global core.quotePath false

          git add -A
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "لا توجد تغييرات جديدة للمزامنة."
            exit 0
          fi

          git commit -m "Auto-update channels via Puppeteer: $(date)"
          git pull --rebase -X ours origin main
          git push origin main
