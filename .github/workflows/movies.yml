name: افلام

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    permissions:
      contents: write
      
    steps:
    - name: Checkout with token
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Ensure movies directory exists
      run: mkdir -p movies

    # 1️⃣ المزامنة والتنظيف
    - name: Synchronize with remote
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin
        git reset --hard origin/main
        git clean -fd
    
    # 2️⃣ تثبيت حزم النظام المطلوبة لتشغيل متصفح كروم المخفي (Puppeteer)
    - name: Install System Dependencies for Puppeteer
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2
        
    # 3️⃣ تثبيت الحزم الخاصة بالمشروع والتأكد من تحميل متصفح Puppeteer
    - name: Install Dependencies
      run: |
        npm install
        npm install puppeteer jsdom # للضمان في حال لم تكن موجودة في package.json
        npx puppeteer browsers install chrome # أمر إجباري في النسخ الحديثة لضمان تحميل الكروم
        
    # 4️⃣ تشغيل السكربت
    - name: Run movie scraper
      run: |
        echo "🎬 بدء استخراج الأفلام والسيرفرات..."
        node movies.js --daily-update
      continue-on-error: true
    
    - name: Check for changes
      id: changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "✅ هناك تغييرات جديدة"
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "⏭️ لا توجد تغييرات"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
    
    # 5️⃣ الرفع (Push)
    - name: Push changes (if any)
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git add movies/
        COMMIT_MSG="🎬 تحديث الأفلام والسيرفرات - $(date +'%Y-%m-%d %H:%M')"
        git commit -m "$COMMIT_MSG"
        
        ATTEMPT=1
        MAX_ATTEMPTS=3
        
        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "🚀 محاولة Push #$ATTEMPT"
          
          if git pull --rebase origin main; then
            echo "✅ تم سحب التغييرات بنجاح"
            
            if git push origin main; then
              echo "🎉 تم رفع التغييرات بنجاح!"
              break
            else
              echo "❌ فشل Push #$ATTEMPT"
            fi
          else
            echo "❌ فشل pull في المحاولة #$ATTEMPT"
          fi
          
          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "💥 فشلت جميع المحاولات"
            exit 1
          fi
          
          ATTEMPT=$((ATTEMPT + 1))
          echo "⏳ انتظار 10 ثواني قبل المحاولة التالية..."
          sleep 10
        done
